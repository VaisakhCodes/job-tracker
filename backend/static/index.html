<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/api.js"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">

<!-- Navbar -->
<nav class="border-b border-gray-800 px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-white">Job Tracker <span class="text-blue-500">AI</span></h1>
    <div class="flex items-center gap-4">
        <a href="analyser.html" class="text-sm text-gray-400 hover:text-white transition">JD Analyser</a>
        <button onclick="logout()" class="text-sm text-gray-400 hover:text-red-400 transition">Logout</button>
    </div>
</nav>

<div class="max-w-6xl mx-auto px-6 py-8">

    <!-- Stats Row -->
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8" id="statsRow">
        <!-- filled by JS -->
    </div>

    <!-- Add Application Button -->
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-lg font-semibold">Applications</h2>
        <button onclick="openModal()"
            class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition">
            + Add Application
        </button>
    </div>

    <!-- Filter Tabs -->
    <div class="flex gap-2 mb-6 flex-wrap">
        <button onclick="filterApps(null)" id="filter-all"
            class="filter-btn px-3 py-1.5 rounded-lg text-sm bg-blue-600 text-white">All</button>
        <button onclick="filterApps('applied')" id="filter-applied"
            class="filter-btn px-3 py-1.5 rounded-lg text-sm bg-gray-800 text-gray-400">Applied</button>
        <button onclick="filterApps('interview')" id="filter-interview"
            class="filter-btn px-3 py-1.5 rounded-lg text-sm bg-gray-800 text-gray-400">Interview</button>
        <button onclick="filterApps('offer')" id="filter-offer"
            class="filter-btn px-3 py-1.5 rounded-lg text-sm bg-gray-800 text-gray-400">Offer</button>
        <button onclick="filterApps('rejected')" id="filter-rejected"
            class="filter-btn px-3 py-1.5 rounded-lg text-sm bg-gray-800 text-gray-400">Rejected</button>
    </div>

    <!-- Applications Table -->
    <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-hidden">
        <table class="w-full text-sm">
            <thead class="border-b border-gray-800">
                <tr class="text-gray-400 text-left">
                    <th class="px-6 py-4 font-medium">Company</th>
                    <th class="px-6 py-4 font-medium">Role</th>
                    <th class="px-6 py-4 font-medium">Status</th>
                    <th class="px-6 py-4 font-medium">Fit Score</th>
                    <th class="px-6 py-4 font-medium">Applied</th>
                    <th class="px-6 py-4 font-medium">Actions</th>
                </tr>
            </thead>
            <tbody id="appTableBody">
                <tr>
                    <td colspan="6" class="px-6 py-12 text-center text-gray-500">
                        Loading applications...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Add Application Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 px-4">
    <div class="bg-gray-900 rounded-2xl p-8 w-full max-w-lg border border-gray-700">
        <h3 class="text-lg font-semibold mb-6">Add Application</h3>
        <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-sm text-gray-400 block mb-1">Company *</label>
                    <input id="company" type="text" placeholder="Google"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 text-sm">
                </div>
                <div>
                    <label class="text-sm text-gray-400 block mb-1">Role *</label>
                    <input id="role" type="text" placeholder="Python Developer"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 text-sm">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-sm text-gray-400 block mb-1">Status</label>
                    <select id="status"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-white focus:outline-none focus:border-blue-500 text-sm">
                        <option value="applied">Applied</option>
                        <option value="interview">Interview</option>
                        <option value="offer">Offer</option>
                        <option value="rejected">Rejected</option>
                        <option value="withdrawn">Withdrawn</option>
                    </select>
                </div>
                <div>
                    <label class="text-sm text-gray-400 block mb-1">Applied Date</label>
                    <input id="appliedDate" type="date"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-white focus:outline-none focus:border-blue-500 text-sm">
                </div>
            </div>
            <div>
                <label class="text-sm text-gray-400 block mb-1">Job URL</label>
                <input id="jobUrl" type="url" placeholder="https://..."
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 text-sm">
            </div>
            <div>
                <label class="text-sm text-gray-400 block mb-1">Notes</label>
                <textarea id="notes" rows="3" placeholder="Add notes..."
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 text-sm resize-none"></textarea>
            </div>
        </div>
        <div class="flex gap-3 mt-6">
            <button onclick="closeModal()"
                class="flex-1 bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium py-2.5 rounded-lg transition text-sm">
                Cancel
            </button>
            <button onclick="handleAddApplication()"
                class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition text-sm">
                Add Application
            </button>
        </div>
    </div>
</div>

<script>
    requireAuth();

    const STATUS_COLORS = {
        applied:   'bg-blue-900 text-blue-300',
        interview: 'bg-yellow-900 text-yellow-300',
        offer:     'bg-green-900 text-green-300',
        rejected:  'bg-red-900 text-red-300',
        withdrawn: 'bg-gray-700 text-gray-400'
    };

    let allApplications = [];
    let currentFilter = null;

    async function loadDashboard() {
        allApplications = await api.getApplications();
        renderStats(allApplications);
        renderTable(allApplications);
    }

    function renderStats(apps) {
        const counts = { applied: 0, interview: 0, offer: 0, rejected: 0, withdrawn: 0 };
        apps.forEach(a => counts[a.status] = (counts[a.status] || 0) + 1);
        const total = apps.length;
        const interviewRate = total ? ((counts.interview + counts.offer) / total * 100).toFixed(0) : 0;

        const statsRow = document.getElementById('statsRow');
        statsRow.innerHTML = `
            ${statCard(total, 'Total', 'text-white')}
            ${statCard(counts.applied, 'Applied', 'text-blue-400')}
            ${statCard(counts.interview, 'Interview', 'text-yellow-400')}
            ${statCard(counts.offer, 'Offer', 'text-green-400')}
            ${statCard(interviewRate + '%', 'Response Rate', 'text-purple-400')}
        `;
    }

    function statCard(value, label, colorClass) {
        return `
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 text-center">
                <div class="text-2xl font-bold ${colorClass}">${value}</div>
                <div class="text-xs text-gray-500 mt-1">${label}</div>
            </div>`;
    }

    function renderTable(apps) {
        const tbody = document.getElementById('appTableBody');
        if (!apps.length) {
            tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-gray-500">
                No applications yet. Click "Add Application" to get started.
            </td></tr>`;
            return;
        }

        tbody.innerHTML = apps.map(app => {
            const fitScore = app.analysis
                ? `<span class="font-medium ${app.analysis.fit_score >= 0.5 ? 'text-green-400' : 'text-yellow-400'}">
                     ${(app.analysis.fit_score * 100).toFixed(0)}%
                   </span>`
                : '<span class="text-gray-600">—</span>';

            const date = app.applied_date
                ? new Date(app.applied_date).toLocaleDateString()
                : '<span class="text-gray-600">—</span>';

            return `
                <tr class="border-t border-gray-800 hover:bg-gray-800/50 transition">
                    <td class="px-6 py-4 font-medium">${app.company}</td>
                    <td class="px-6 py-4 text-gray-300">${app.role}</td>
                    <td class="px-6 py-4">
                        <select onchange="updateStatus(${app.id}, this.value)"
                            class="bg-transparent text-xs font-medium px-2 py-1 rounded-full border-0 cursor-pointer
                                   ${STATUS_COLORS[app.status] || ''}">
                            <option value="applied"    ${app.status==='applied'    ? 'selected':''}>Applied</option>
                            <option value="interview"  ${app.status==='interview'  ? 'selected':''}>Interview</option>
                            <option value="offer"      ${app.status==='offer'      ? 'selected':''}>Offer</option>
                            <option value="rejected"   ${app.status==='rejected'   ? 'selected':''}>Rejected</option>
                            <option value="withdrawn"  ${app.status==='withdrawn'  ? 'selected':''}>Withdrawn</option>
                        </select>
                    </td>
                    <td class="px-6 py-4">${fitScore}</td>
                    <td class="px-6 py-4 text-gray-400 text-xs">${date}</td>
                    <td class="px-6 py-4">
                        <button onclick="deleteApp(${app.id})"
                            class="text-xs text-gray-500 hover:text-red-400 transition">Delete</button>
                    </td>
                </tr>`;
        }).join('');
    }

    async function filterApps(status) {
        currentFilter = status;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.className = 'filter-btn px-3 py-1.5 rounded-lg text-sm bg-gray-800 text-gray-400';
        });
        const activeId = status ? `filter-${status}` : 'filter-all';
        document.getElementById(activeId).className = 'filter-btn px-3 py-1.5 rounded-lg text-sm bg-blue-600 text-white';

        const filtered = status
            ? allApplications.filter(a => a.status === status)
            : allApplications;
        renderTable(filtered);
    }

    async function updateStatus(id, status) {
        await api.updateApplication(id, { status });
        await loadDashboard();
    }

    async function deleteApp(id) {
        if (!confirm('Delete this application?')) return;
        await api.deleteApplication(id);
        await loadDashboard();
    }

    function openModal() {
        document.getElementById('modal').classList.remove('hidden');
        document.getElementById('appliedDate').value = new Date().toISOString().split('T')[0];
    }

    function closeModal() {
        document.getElementById('modal').classList.add('hidden');
        ['company','role','notes','jobUrl'].forEach(id => document.getElementById(id).value = '');
    }

    async function handleAddApplication() {
        const company = document.getElementById('company').value.trim();
        const role = document.getElementById('role').value.trim();
        if (!company || !role) return alert('Company and role are required');

        await api.createApplication({
            company,
            role,
            status: document.getElementById('status').value,
            job_url: document.getElementById('jobUrl').value || null,
            notes: document.getElementById('notes').value || null,
            applied_date: document.getElementById('appliedDate').value
                ? new Date(document.getElementById('appliedDate').value).toISOString()
                : null
        });

        closeModal();
        await loadDashboard();
    }

    function logout() {
        clearToken();
        window.location.href = 'login.html';
    }

    loadDashboard();
</script>
</body>
</html>
