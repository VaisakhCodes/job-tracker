<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/api.js"></script>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md px-6">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white">Job Tracker</h1>
        <p class="text-gray-400 mt-2">Track applications. Analyse fit. Land the job.</p>
    </div>

    <div class="bg-gray-900 rounded-2xl p-8 border border-gray-800">
        <!-- Tab Toggle -->
        <div class="flex mb-6 bg-gray-800 rounded-lg p-1">
            <button id="loginTab"
                onclick="showTab('login')"
                class="flex-1 py-2 rounded-md text-sm font-medium bg-blue-600 text-white transition">
                Login
            </button>
            <button id="registerTab"
                onclick="showTab('register')"
                class="flex-1 py-2 rounded-md text-sm font-medium text-gray-400 transition">
                Register
            </button>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="space-y-4">
                <div>
                    <label class="text-sm text-gray-400 block mb-1">Email</label>
                    <input id="loginEmail" type="email" placeholder="you@example.com"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="text-sm text-gray-400 block mb-1">Password</label>
                    <input id="loginPassword" type="password" placeholder="••••••••"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500">
                </div>
                <p id="loginError" class="text-red-400 text-sm hidden"></p>
                <button onclick="handleLogin()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition">
                    Sign In
                </button>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="hidden">
            <div class="space-y-4">
                <div>
                    <label class="text-sm text-gray-400 block mb-1">Full Name</label>
                    <input id="regName" type="text" placeholder="Vaisakh Mohan"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="text-sm text-gray-400 block mb-1">Email</label>
                    <input id="regEmail" type="email" placeholder="you@example.com"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="text-sm text-gray-400 block mb-1">Password</label>
                    <input id="regPassword" type="password" placeholder="••••••••"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500">
                </div>
                <p id="registerError" class="text-red-400 text-sm hidden"></p>
                <p id="registerSuccess" class="text-green-400 text-sm hidden"></p>
                <button onclick="handleRegister()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition">
                    Create Account
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // Redirect if already logged in
    if (getToken()) window.location.href = 'index.html';

    function showTab(tab) {
        const isLogin = tab === 'login';
        document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
        document.getElementById('registerForm').classList.toggle('hidden', isLogin);
        document.getElementById('loginTab').className = `flex-1 py-2 rounded-md text-sm font-medium transition ${isLogin ? 'bg-blue-600 text-white' : 'text-gray-400'}`;
        document.getElementById('registerTab').className = `flex-1 py-2 rounded-md text-sm font-medium transition ${!isLogin ? 'bg-blue-600 text-white' : 'text-gray-400'}`;
    }

    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const errorEl = document.getElementById('loginError');

        if (!email || !password) {
            errorEl.textContent = 'Please fill in all fields';
            errorEl.classList.remove('hidden');
            return;
        }

        const data = await api.login(email, password);
        if (data.access_token) {
            setToken(data.access_token);
            window.location.href = 'index.html';
        } else {
            errorEl.textContent = data.detail || 'Login failed';
            errorEl.classList.remove('hidden');
        }
    }

    async function handleRegister() {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const errorEl = document.getElementById('registerError');
        const successEl = document.getElementById('registerSuccess');

        if (!name || !email || !password) {
            errorEl.textContent = 'Please fill in all fields';
            errorEl.classList.remove('hidden');
            return;
        }

        const data = await api.register(email, name, password);
        if (data.id) {
            successEl.textContent = 'Account created! You can now log in.';
            successEl.classList.remove('hidden');
            errorEl.classList.add('hidden');
            setTimeout(() => showTab('login'), 1500);
        } else {
            errorEl.textContent = data.detail || 'Registration failed';
            errorEl.classList.remove('hidden');
        }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const loginHidden = document.getElementById('loginForm').classList.contains('hidden');
            loginHidden ? handleRegister() : handleLogin();
        }
    });
</script>
</body>
</html>
